server.port=8080

# ── PostgreSQL / HikariCP ──────────────────────────────────────
# Server only reads from DB (metrics queries) — keep pool small.
# Set via env vars on EC2: RDS_HOST, RDS_USER, RDS_PASS
spring.datasource.url=jdbc:postgresql://${RDS_HOST}:5432/chatflow
spring.datasource.username=${RDS_USER}
spring.datasource.password=${RDS_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=ChatFlowReaderPool
spring.jackson.serialization.write-dates-as-timestamps=false

# Tomcat thread pool — must exceed concurrent WebSocket connections + Consumer HTTP requests
# 128 WS sessions + 20 Consumer threads + internal overhead = ~300 needed
server.tomcat.threads.max=500
server.tomcat.threads.min-spare=50

# Server identity — override per instance: -Dapp.server-id=server-8082
app.server-id=server-8080

# SQS — queue names follow pattern chatflow-room-{01..20}.fifo
app.sqs.region=us-west-2
app.sqs.account-id=449126751631
app.sqs.queue-name-prefix=chatflow-room-

# Resilience4j Circuit Breaker for SQS publish
# sliding-window-size: last N calls used to calculate failure rate
# failure-rate-threshold: open circuit if failure rate exceeds this %
# wait-duration-in-open-state: how long to stay open before trying again
# permitted-calls-in-half-open-state: trial calls allowed in half-open
resilience4j.circuitbreaker.instances.sqsPublisher.sliding-window-size=10
resilience4j.circuitbreaker.instances.sqsPublisher.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.sqsPublisher.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.sqsPublisher.permitted-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.sqsPublisher.register-health-indicator=true
resilience4j.circuitbreaker.instances.sqsPublisher.automatic-transition-from-open-to-half-open-enabled=true
