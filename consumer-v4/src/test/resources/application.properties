# Test overrides — used for all unit/integration tests.
# H2 in-memory DB replaces PostgreSQL so no real RDS is needed.
server.port=8081

# H2 in PostgreSQL compatibility mode
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Disable schema auto-init (we use manual JDBC in tests)
spring.sql.init.mode=never

# HikariCP — minimal for tests
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=2000

# SQS — fake values, SqsConsumerService is @MockBean in context tests
app.sqs.region=us-east-1
app.sqs.account-id=000000000000
app.sqs.queue-name-prefix=chatflow-room-
app.consumer.threads=1
app.broadcast.server-urls=http://localhost:8080

# DB write pipeline — small values for fast tests
app.db.batch-size=10
app.db.flush-interval-ms=100
app.db.writer-threads=1
app.db.queue-capacity=1000
app.db.max-retries=1
app.db.retry-backoff-ms=100
