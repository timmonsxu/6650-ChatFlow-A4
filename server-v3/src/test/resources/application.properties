# Test overrides — H2 in-memory DB, no real RDS needed.
server.port=8080
spring.jackson.serialization.write-dates-as-timestamps=false
server.tomcat.threads.max=50

app.server-id=server-test
app.sqs.region=us-east-1
app.sqs.account-id=000000000000
app.sqs.queue-name-prefix=chatflow-room-

# H2 in PostgreSQL compatibility mode
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# HikariCP — minimal for tests
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=2000

# Init schema from test resource on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:test-schema.sql

# Resilience4j (keep same as prod — CB doesn't touch DB)
resilience4j.circuitbreaker.instances.sqsPublisher.sliding-window-size=10
resilience4j.circuitbreaker.instances.sqsPublisher.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.sqsPublisher.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.sqsPublisher.permitted-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.sqsPublisher.register-health-indicator=true
resilience4j.circuitbreaker.instances.sqsPublisher.automatic-transition-from-open-to-half-open-enabled=true
