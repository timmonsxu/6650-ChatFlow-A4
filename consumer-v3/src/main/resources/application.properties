server.port=8081

# SQS config
app.sqs.region=us-west-2
app.sqs.account-id=449126751631
app.sqs.queue-name-prefix=chatflow-room-

# Number of SQS polling threads — one per room
app.consumer.threads=20

# Comma-separated server-v3 base URLs to broadcast to (private IPs on EC2)
app.broadcast.server-urls=http://172.31.25.72:8080,http://172.31.24.104:8080

# ── PostgreSQL / HikariCP ──────────────────────────────────────
# Credentials supplied via environment variables — never hard-code here.
#   export RDS_HOST=<rds-endpoint>
#   export RDS_USER=chatflow_user
#   export RDS_PASS=<password>
spring.datasource.url=jdbc:postgresql://${RDS_HOST}:5432/chatflow
spring.datasource.username=${RDS_USER}
spring.datasource.password=${RDS_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP pool — sized for writer-threads + small headroom
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=ChatFlowWriterPool

# ── DB Write Pipeline tuning ───────────────────────────────────
# Rows per multi-row INSERT statement.  Test with 100 / 500 / 1000 / 5000.
app.db.batch-size=500
# Max milliseconds a writer thread waits before flushing a partial batch.
app.db.flush-interval-ms=500
# Number of dedicated DB writer threads (keep <= hikari.maximum-pool-size).
app.db.writer-threads=5
# In-memory write buffer capacity.  put() blocks only when this is full.
app.db.queue-capacity=100000
# Retry attempts per failed batch before counting messages as lost.
app.db.max-retries=3
# Base backoff ms between retries (multiplied by attempt number).
app.db.retry-backoff-ms=1000
